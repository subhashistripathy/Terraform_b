name: Snyk Terraform IaC Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  snyk-iac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Snyk IaC scan — continue-on-error so SARIF always gets generated
      - name: Run Snyk IaC scan
        uses: snyk/actions/iac@master
        continue-on-error: true          # ← allows SARIF to be written even if scan finds issues
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        with:
          args: --severity-threshold=high

      # Manually generate SARIF via Snyk CLI 
      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Generate SARIF file
        continue-on-error: true          # ← findings shouldn't stop SARIF creation
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        run: |
          snyk iac test . \
            --severity-threshold=high \
            --sarif-file-output=snyk-terraform.sarif || true

      # Create empty SARIF if still missing
      - name: Ensure SARIF file exists
        run: |
          if [ ! -f snyk-terraform.sarif ]; then
            echo "SARIF not found — creating empty valid SARIF"
            cat > snyk-terraform.sarif << 'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Snyk IaC",
                    "version": "1.0.0",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
          fi
          ls -la snyk-terraform.sarif

      # Upload to GitHub Security tab
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-terraform.sarif

      # Fail pipeline if Snyk found vulnerabilities
      - name: Check scan results
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        run: |
          snyk iac test . --severity-threshold=high
